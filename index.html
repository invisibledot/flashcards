<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards Multi-Sheet + SM-2</title>
<script src="config.js"></script>
<link rel="stylesheet" href="flashcards.css">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
</head>
<body>

<!-- Menu -->
<div id="menu">
  <h2>Select a Flashcard Set</h2>
  <div id="setList"></div>
</div>

<!-- Flashcard area -->
<div id="flashcardArea" class="hidden">
  <button id="backToMenu">← Back</button>

  <div id="flashcard" class="flashcard">
    <div class="card-inner">
      <div class="card-front"></div>
      <div class="card-back">
        <div class="answer-text"></div>
        <div class="extra"></div>
      </div>
    </div>
  </div>

  <div id="score"></div>
</div>

<script>
const SPREADSHEET_ID = CONFIG.SPREADSHEET_ID;
const API_KEY = CONFIG.API_KEY;

// DOM elements
const menuDiv = document.getElementById("menu");
const flashcardArea = document.getElementById("flashcardArea");
const setSelector = document.getElementById("setSelector");
const backBtn = document.getElementById("backToMenu");
const card = document.getElementById("flashcard");
const frontDiv = card.querySelector(".card-front");
const backDiv = card.querySelector(".card-back");
const answerDiv = backDiv.querySelector(".answer-text");
const extraDiv = backDiv.querySelector(".extra");
const scoreDiv = document.getElementById("score");

// State
let flashcards = [];
let currentIndex = 0;
let isFlipped = false;
let cardData = {};
let storageKey = "";

// --- Flip card ---
card.addEventListener("click", () => {
  card.classList.toggle("flipped");
  isFlipped = !isFlipped;
});

// --- Swipe logic ---
let startX = 0;
card.addEventListener("touchstart", e => startX = e.touches[0].clientX, { passive:true });
card.addEventListener("touchend", e => {
  const deltaX = e.changedTouches[0].clientX - startX;
  if(deltaX > 50){ if(!isFlipped){ card.classList.add("flipped"); isFlipped=true; } else markCorrect(); }
  else if(deltaX < -50) markIncorrect();
});

// --- SM-2 ---
function initializeCard(c){ if(!cardData[c.front]) cardData[c.front]={repetition:0,interval:0,ease:2.5,due:Date.now()}; }

function markCorrect(){
  const c=flashcards[currentIndex], d=cardData[c.front];
  d.repetition+=1;
  d.interval=d.repetition===1?1:d.repetition===2?3:Math.round(d.interval*d.ease);
  d.due=Date.now()+d.interval*24*60*60*1000;
  saveSM2(); nextCard();
}

function markIncorrect(){
  const c=flashcards[currentIndex], d=cardData[c.front];
  d.repetition=0; d.interval=1; d.due=Date.now()+24*60*60*1000;
  saveSM2(); nextCard();
}

function nextCard(){
  const now=Date.now();
  const dueCards=flashcards.filter(c=>{initializeCard(c); return cardData[c.front].due<=now;});
  if(dueCards.length===0){ showNoCardsMessage(); return; }
  const random=dueCards[Math.floor(Math.random()*dueCards.length)];
  currentIndex=flashcards.findIndex(c=>c.front===random.front);
  showCard();
}

function showNoCardsMessage(){
  card.classList.remove("flipped");
  frontDiv.textContent="🎉 All done!";
  answerDiv.textContent="No cards due right now.";
  extraDiv.textContent="";
  isFlipped=false;
  scoreDiv.textContent="";
}

function showCard(){
  const c=flashcards[currentIndex];
  initializeCard(c);
  frontDiv.textContent=c.front;
  answerDiv.textContent=c.back;
  extraDiv.textContent=c.note||"";
  card.classList.remove("flipped");
  isFlipped=false;
  const d=cardData[c.front]; scoreDiv.textContent=`Repetition: ${d.repetition}, Interval: ${d.interval} day(s)`;
}

function saveSM2(){ localStorage.setItem(storageKey,JSON.stringify(cardData)); }

// --- Load sheets ---
const setList = document.getElementById("setList");

async function loadSheetNames() {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}?fields=sheets(properties(title))&key=${API_KEY}`;
  const res = await fetch(url);
  const json = await res.json();
  const sheets = json.sheets || [];

  sheets.forEach(s => {
    const btn = document.createElement("button");
    btn.textContent = s.properties.title;
    btn.className = "set-button";
    btn.onclick = () => selectSheet(s.properties.title);
    setList.appendChild(btn);
  });
}

function selectSheet(sheetName) {
  storageKey = `sm2Data-${sheetName}`;
  cardData = JSON.parse(localStorage.getItem(storageKey)) || {};

  menuDiv.classList.add("hidden");
  flashcardArea.classList.remove("hidden");

  loadFlashcardsFromSheet(sheetName);
}

// --- Load sheet values ---
async function loadFlashcardsFromSheet(sheetName){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${sheetName}?key=${API_KEY}`;
  const res=await fetch(url);
  const json=await res.json();
  const rows=json.values||[];
  flashcards=rows.filter(r=>r.length>=2).map(r=>({front:r[0].trim(),back:r[1].trim(),note:r[2]?r[2].trim():""}));
  flashcards.forEach(initializeCard);
  showCard();
}

// --- Back to menu ---
backBtn.addEventListener("click",()=>{
  menuDiv.classList.remove("hidden");
  flashcardArea.classList.add("hidden");
});

// --- Init ---
loadSheetNames();
</script>
</body>
</html>
